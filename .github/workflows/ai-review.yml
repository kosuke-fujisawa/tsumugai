name: AI Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.lock'
      - '**/package-lock.json'
      - '**/yarn.lock'
      - '**/pnpm-lock.yaml'
      - '**/Package.resolved'
      - '**/dist/**'
      - '**/build/**'
      - '**/DerivedData/**'
      - '**/*.min.js'
      - '**/*.map'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.webp'
      - '**/*.svg'
      - '**/*.pdf'
      - '**/*.zip'
      - '.github/workflows/ai-review.yml'
      - 'scripts/ai-review/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect review input
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: node scripts/ai-review/collect-input.mjs

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || 'gpt-5-mini' }}
        run: node scripts/ai-review/review.mjs

      - name: Publish review comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/ai-review/publish-comment.mjs

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-review
          path: tmp/ai-review/
          retention-days: 3
