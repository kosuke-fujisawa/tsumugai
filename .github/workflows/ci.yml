name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
    - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@374a27f26986edd8c430f386d152a856e179c0ae # v4.2.4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Format check
      id: format
      run: cargo fmt --all -- --check

    - name: Clippy check
      id: clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Tests
      id: test
      run: cargo test

    - name: compile smoke test
      id: compile
      run: cargo run -- compile examples/spring/scenario/spring_001.md --target web --output /tmp/story-bundle.json

    - name: Comment CI summary
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const marker = "<!-- ci-summary -->";
          const rows = [
            ["Format check", "${{ steps.format.outcome }}"],
            ["Clippy check", "${{ steps.clippy.outcome }}"],
            ["Tests", "${{ steps.test.outcome }}"],
            ["compile smoke test", "${{ steps.compile.outcome }}"],
          ];
          const label = (outcome) =>
            outcome === "success" ? "PASS" : outcome === "skipped" ? "SKIPPED" : "FAIL";
          const table = [
            "| Check | Result |",
            "| --- | --- |",
            ...rows.map(([name, outcome]) => `| ${name} | ${label(outcome)} |`),
          ].join("\n");
          const overall = "${{ job.status }}" === "success" ? "PASS" : "FAIL";
          const body = `${marker}\n## CI Summary\n\nResult: ${overall}\n\n${table}\n`;

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const previous = comments.find((comment) =>
            comment.user.type === "Bot" && comment.body?.includes(marker)
          );

          if (previous) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: previous.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }
